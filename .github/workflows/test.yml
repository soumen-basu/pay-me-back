name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies (uv)
        run: |
          pip install uv
          uv --version

      - name: Setup environment variables
        run: |
          # Copy test env to avoid missing env files during CI
          cp env/test.env env/local.env

      - name: Execute Tests
        run: |
          chmod +x run_tests.sh
          ./run_tests.sh
