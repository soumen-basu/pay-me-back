# Dedicated server block for the PayMeBack SPA
server {
    listen 80;
    server_name paymeback.ignore.smplfd.in;

    # Using $host directly retains your dynamic folder structure mapping
    root /usr/share/nginx/html/sites/$host;
    index index.html;

    location / {
        # Crucial for Single Page Applications (React Router)
        # Tries the file, then directory, then falls back to handling routing client-side.
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /404.html;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}

# Catch-all server block for your other classic static domains
server {
    listen 80;
    server_name _; # Catch-all for all other domains

    # This variable magic maps the domain name to the folder name
    set $site_path $host;

    root /usr/share/nginx/html/sites/$site_path;
    index index.html;

    location / {
        # Standard static site behavior: if the file/folder isn't there, return 404
        try_files $uri $uri/ =404;
    }

    # Custom error page (optional)
    error_page 404 /404.html;
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
