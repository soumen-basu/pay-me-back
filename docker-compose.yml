services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: spinner
      POSTGRES_PASSWORD: longirostris
      POSTGRES_DB: stenella
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://spinner:longirostris@db:5432/stenella
    depends_on:
      - db
    volumes:
      - .:/app # Hot-reloading: changes in code reflect in the container
      - /app/.venv
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000" # Vite default port
    env_file:
      - frontend/.env
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent local node_modules from overriding container's
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
