services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - env/local.env
      - env/credentials.env
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - db
    volumes:
      - .:/app # Hot-reloading: changes in code reflect in the container
      - /app/.venv
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    env_file:
      - env/local.env
      - env/credentials.env
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent local node_modules from overriding container's
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
